<text x="116" y="592" fill="#5C6B7C" font-family="Manrope, Arial, sans-serif" font-size="18">deterministic steps</text>
<text x="116" y="620" fill="#5C6B7C" font-family="Manrope, Arial, sans-serif" font-size="18">strong SOP / stable routing</text>

