<text x="656" y="592" fill="#5C6B7C" font-family="Manrope, Arial, sans-serif" font-size="18">state, logs, trace ID</text>
<text x="656" y="620" fill="#5C6B7C" font-family="Manrope, Arial, sans-serif" font-size="18">observable execution</text>

